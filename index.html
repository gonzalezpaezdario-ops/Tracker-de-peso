<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WeightTrack Pro Elite</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script>tailwind.config = { darkMode: 'class' }</script>
    <style>
        body { transition: background-color 0.3s ease; font-family: 'Inter', sans-serif; }
        .card { transition: all 0.3s ease; }
        
        .glow-button:active {
            transform: scale(0.92);
            box-shadow: 0 0 20px rgba(16, 185, 129, 0.5);
        }
        .glow-button:hover {
            box-shadow: 0 0 10px rgba(16, 185, 129, 0.2);
        }

        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        input[type=number] { -moz-appearance: textfield; }
        
        /* Animación suave para nuevos registros */
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .entry-anim { animation: fadeIn 0.4s ease forwards; }
    </style>
</head>
<body class="bg-slate-50 dark:bg-slate-900 min-h-screen pb-10 px-4">
    <div class="max-w-md mx-auto">
        <header class="py-8 flex justify-between items-center">
            <div>
                <h1 class="text-3xl font-black text-slate-800 dark:text-white tracking-tighter italic uppercase">Weight<span class="text-emerald-500">Track</span></h1>
                <p id="currentDateDisplay" class="text-slate-400 text-[10px] font-bold uppercase tracking-[0.2em] mt-1"></p>
            </div>
            <button id="themeToggle" class="p-3 rounded-2xl bg-white dark:bg-slate-800 shadow-sm border border-slate-200 dark:border-slate-700 active:scale-90 transition-all">
                <span class="dark:hidden text-xl">🌙</span><span class="hidden dark:inline text-xl">☀️</span>
            </button>
        </header>

        <div class="card bg-white dark:bg-slate-800 p-8 rounded-[3rem] shadow-2xl shadow-slate-200/60 dark:shadow-none mb-4 border border-transparent dark:border-slate-700">
            <form id="weightForm" class="space-y-6">
                <div class="text-center">
                    <label class="block text-[10px] font-black text-slate-400 dark:text-slate-500 uppercase tracking-[0.3em] mb-4">Peso hoy (kg)</label>
                    <input type="number" id="weightInput" step="0.1" required
                        class="w-full bg-transparent border-none text-center text-6xl font-black text-slate-800 dark:text-white outline-none focus:ring-0">
                </div>
                
                <div class="pt-4">
                    <input type="date" id="dateInput" required
                        class="w-full p-4 bg-slate-50 dark:bg-slate-900 border border-slate-100 dark:border-slate-700 rounded-2xl focus:ring-2 focus:ring-emerald-400 outline-none text-sm font-bold text-slate-600 dark:text-slate-300 text-center">
                </div>
                
                <button type="submit" class="w-full bg-emerald-500 hover:bg-emerald-600 text-white font-black py-5 rounded-2xl transition-all shadow-lg shadow-emerald-200 dark:shadow-none uppercase tracking-widest text-xs active:scale-95">
                    Registrar Sesión
                </button>
            </form>
            <p id="errorMsg" class="text-red-500 text-[10px] mt-4 text-center font-bold uppercase tracking-widest hidden">⚠️ Ya existe un registro para esta fecha</p>
        </div>

        <div class="flex justify-center gap-6 mb-10">
            <button onclick="stepWeight(-0.1)" class="glow-button w-20 h-14 bg-white dark:bg-slate-800 rounded-2xl shadow-sm border border-slate-200 dark:border-slate-700 text-slate-400 dark:text-emerald-400 font-black transition-all flex items-center justify-center text-lg">
                -0.1
            </button>
            <button onclick="stepWeight(0.1)" class="glow-button w-20 h-14 bg-white dark:bg-slate-800 rounded-2xl shadow-sm border border-slate-200 dark:border-slate-700 text-slate-400 dark:text-emerald-400 font-black transition-all flex items-center justify-center text-lg">
                +0.1
            </button>
        </div>

        <div class="card bg-white dark:bg-slate-800 p-6 rounded-[2.5rem] shadow-sm mb-8 border border-transparent dark:border-slate-700">
            <canvas id="weightChart" style="height: 180px;"></canvas>
        </div>

        <div id="historyList" class="space-y-4 px-1"></div>
    </div>

    <script>
        let logs = JSON.parse(localStorage.getItem('weightLogs')) || [];
        let chartInstance = null;

        const weightInput = document.getElementById('weightInput');
        const dateInput = document.getElementById('dateInput');
        const dateDisplay = document.getElementById('currentDateDisplay');

        // Sincronización de fecha automática
        function syncSystemDate() {
            const now = new Date();
            const year = now.getFullYear();
            const month = String(now.getMonth() + 1).padStart(2, '0');
            const day = String(now.getDate()).padStart(2, '0');
            const formattedDate = `${year}-${month}-${day}`;
            
            dateInput.value = formattedDate;
            
            // Mostrar fecha elegante en el header
            const options = { weekday: 'long', day: 'numeric', month: 'short' };
            dateDisplay.innerText = now.toLocaleDateString('es-ES', options);
        }

        function setInitialWeight() {
            if (logs.length > 0) {
                const sorted = [...logs].sort((a,b) => new Date(a.date) - new Date(b.date));
                weightInput.value = sorted[sorted.length - 1].weight.toFixed(1);
            } else {
                weightInput.value = "70.0";
            }
        }

        function stepWeight(val) {
            let current = parseFloat(weightInput.value) || 70;
            weightInput.value = (current + val).toFixed(1);
        }

        // Gestión de Tema
        if (localStorage.theme === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        }
        
        document.getElementById('themeToggle').onclick = () => {
            const isDark = document.documentElement.classList.toggle('dark');
            localStorage.theme = isDark ? 'dark' : 'light';
            updateUI();
        };

        function initChart() {
            const ctx = document.getElementById('weightChart').getContext('2d');
            chartInstance = new Chart(ctx, {
                type: 'line',
                data: { labels: [], datasets: [{ data: [], borderColor: '#10b981', tension: 0.4, fill: false, borderWidth: 4, pointRadius: 0 }] },
                options: {
                    responsive: true, maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: { 
                        y: { ticks: { color: '#94a3b8', font: { size: 10, weight: '600' } }, grid: { color: 'rgba(148,163,184,0.05)' } },
                        x: { ticks: { color: '#94a3b8', font: { size: 9 } }, grid: { display: false } }
                    }
                }
            });
        }

        function updateUI() {
            logs.sort((a, b) => new Date(a.date) - new Date(b.date));
            localStorage.setItem('weightLogs', JSON.stringify(logs));

            chartInstance.data.labels = logs.map(l => l.date.split('-').reverse().slice(0,2).join('/'));
            chartInstance.data.datasets[0].data = logs.map(l => l.weight);
            chartInstance.update();

            const list = document.getElementById('historyList');
            list.innerHTML = '<h3 class="text-[10px] font-black text-slate-400 uppercase tracking-[0.2em] mb-4 ml-2">Registros recientes</h3>';
            
            [...logs].reverse().forEach((entry, index) => {
                const div = document.createElement('div');
                div.className = `flex items-center justify-between bg-white dark:bg-slate-800 p-5 rounded-3xl border border-slate-100 dark:border-slate-700 shadow-sm entry-anim`;
                div.style.animationDelay = `${index * 0.05}s`;
                div.innerHTML = `
                    <div class="flex items-center gap-4">
                        <div class="w-2 h-2 rounded-full bg-emerald-500 shadow-[0_0_8px_rgba(16,185,129,0.8)]"></div>
                        <span class="font-black text-slate-800 dark:text-white text-lg">${entry.weight} <span class="text-[10px] text-slate-400 font-normal">KG</span></span>
                    </div>
                    <div class="flex items-center gap-4">
                        <span class="text-[10px] font-bold text-slate-400 uppercase tracking-tighter">${entry.date}</span>
                        <button onclick="deleteEntry(${entry.id})" class="text-slate-200 hover:text-red-400 transition-colors p-1">✕</button>
                    </div>
                `;
                list.appendChild(div);
            });
        }

        document.getElementById('weightForm').onsubmit = (e) => {
            e.preventDefault();
            const dateVal = dateInput.value;
            if (logs.some(l => l.date === dateVal)) {
                const error = document.getElementById('errorMsg');
                error.classList.remove('hidden');
                setTimeout(() => error.classList.add('hidden'), 3000);
                return;
            }
            logs.push({ id: Date.now(), weight: parseFloat(weightInput.value), date: dateVal });
            updateUI();
        };

        window.deleteEntry = (id) => {
            if(confirm('¿Eliminar registro?')) {
                logs = logs.filter(l => l.id !== id);
                updateUI();
            }
        };

        window.onload = () => { 
            syncSystemDate(); 
            setInitialWeight(); 
            initChart(); 
            updateUI();
            // Revisar cada minuto si la fecha ha cambiado (medianoche)
            setInterval(syncSystemDate, 60000);
        };
    </script>
</body>
</html>
