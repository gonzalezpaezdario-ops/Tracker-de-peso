<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Oreja's Tracker</title>
    <link rel="icon" href="https://fav.farm/⚖️">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <script>
        tailwind.config = { darkMode: 'class' };
        const savedTheme = localStorage.getItem('theme');
        if (savedTheme === 'dark' || (!savedTheme && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        } else {
            document.documentElement.classList.remove('dark');
        }
    </script>
    <style>
        body { transition: background-color 0.3s; font-family: sans-serif; -webkit-tap-highlight-color: transparent; }
        .glow-button:active { transform: scale(0.95); box-shadow: 0 0 15px #10b981; }
        #chartContainer { min-height: 220px; width: 100%; position: relative; }
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        input[type=number] { -moz-appearance: textfield; }
        .title-glow { text-shadow: 0 0 10px rgba(16, 185, 129, 0.3); }

        /* CAPA NEÓN DE ENTRADA (SPLASH SCREEN) */
        #summarySplash {
            position: fixed;
            inset: 0;
            z-index: 99999;
            display: none; /* Se activa por JS */
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(15px);
            background: rgba(248, 250, 252, 0.9);
            opacity: 0;
            transition: opacity 0.6s ease;
        }
        .dark #summarySplash { background: rgba(15, 23, 42, 0.96); }

        @keyframes neonPulse {
            0%, 100% { text-shadow: 0 0 10px #10b981, 0 0 20px #10b981; transform: scale(1); }
            50% { text-shadow: 0 0 20px #10b981, 0 0 40px #10b981; transform: scale(1.02); }
        }
        .neon-content { animation: neonPulse 2s infinite ease-in-out; }
    </style>
</head>
<body class="bg-slate-50 dark:bg-slate-900 min-h-screen pb-10 px-4">
    
    <div id="summarySplash" onclick="closeSplash()">
        <div class="max-w-xs text-center p-8 neon-content">
            <p class="text-[10px] font-black text-slate-400 uppercase tracking-[0.5em] mb-4">Análisis de Progreso</p>
            <p id="totalLostText" class="text-5xl font-black text-emerald-500 tracking-tighter mb-6"></p>
            <p id="motivationText" class="text-sm text-slate-600 dark:text-slate-300 font-bold leading-relaxed italic mb-8"></p>
            <p class="text-[8px] text-slate-400 uppercase tracking-widest animate-bounce">Toca para entrar</p>
        </div>
    </div>

    <div class="max-w-md mx-auto">
        <header class="py-8 flex justify-between items-center">
            <h1 class="text-3xl font-black text-slate-800 dark:text-white uppercase tracking-tighter title-glow">Oreja's <span class="text-emerald-500">Tracker</span></h1>
            <button id="themeToggle" class="p-3 rounded-2xl bg-white dark:bg-slate-800 shadow-sm border dark:border-slate-700 text-xl"></button>
        </header>

        <div class="bg-white dark:bg-slate-800 p-8 rounded-[2.5rem] shadow-xl mb-4 border dark:border-slate-700">
            <form id="weightForm" class="space-y-6 text-center">
                <label class="text-[10px] font-black text-slate-400 dark:text-slate-500 uppercase tracking-widest">Peso hoy (kg)</label>
                <input type="number" id="weightInput" step="0.01" required class="w-full bg-transparent text-center text-6xl font-black text-slate-800 dark:text-white outline-none">
                <input type="date" id="dateInput" required class="w-full p-4 bg-slate-50 dark:bg-slate-900 border dark:border-slate-700 rounded-2xl text-sm font-bold text-slate-600 dark:text-slate-300 text-center">
                <button type="submit" class="w-full bg-emerald-500 text-white font-black py-5 rounded-2xl shadow-lg uppercase text-xs active:scale-95 transition-all">Registrar</button>
            </form>
        </div>

        <div class="flex justify-center gap-6 mb-8">
            <button onclick="stepWeight(-0.1)" class="glow-button w-20 h-14 bg-white dark:bg-slate-800 rounded-2xl border dark:border-slate-700 text-emerald-500 font-black">-0.1</button>
            <button onclick="stepWeight(0.1)" class="glow-button w-20 h-14 bg-white dark:bg-slate-800 rounded-2xl border dark:border-slate-700 text-emerald-500 font-black">+0.1</button>
        </div>

        <div class="bg-white dark:bg-slate-800 p-4 rounded-[2rem] shadow-sm mb-8 border dark:border-slate-700">
            <div id="chartContainer">
                <canvas id="weightChart"></canvas>
            </div>
        </div>

        <div id="historyList" class="space-y-3"></div>
    </div>

    <script>
        let logs = JSON.parse(localStorage.getItem('weightLogs')) || [];
        let chartInstance = null;

        function initApp() {
            const dateInput = document.getElementById('dateInput');
            const weightInput = document.getElementById('weightInput');
            const themeBtn = document.getElementById('themeToggle');
            
            themeBtn.innerText = document.documentElement.classList.contains('dark') ? '☀️' : '🌙';
            dateInput.value = new Date().toISOString().split('T')[0];
            
            if (logs.length > 0) {
                const sorted = [...logs].sort((a,b) => new Date(a.date) - new Date(b.date));
                weightInput.value = sorted[sorted.length - 1].weight;
                
                // SOLO ACTIVAR EL SPLASH SI HAY DATOS PARA COMPARAR
                if (logs.length >= 2) {
                    showSplash(sorted);
                }
            } else {
                weightInput.value = "75.00";
            }
            
            updateChart();
            renderHistory();
        }

        // Lógica de la Pantalla Splash
        function showSplash(sortedLogs) {
            const splash = document.getElementById('summarySplash');
            const totalText = document.getElementById('totalLostText');
            const motivText = document.getElementById('motivationText');

            const firstWeight = sortedLogs[0].weight;
            const currentWeight = sortedLogs[sortedLogs.length - 1].weight;
            const totalDiff = (currentWeight - firstWeight).toFixed(2);

            if (totalDiff < 0) {
                totalText.innerText = `${Math.abs(totalDiff)} kg MENOS`;
            } else if (totalDiff > 0) {
                totalText.innerText = `${totalDiff} kg MÁS`;
            } else {
                totalText.innerText = "PESO ESTABLE";
            }

            const lastWeight = sortedLogs[sortedLogs.length - 1].weight;
            const prevWeight = sortedLogs[sortedLogs.length - 2].weight;
            const lastDiff = (lastWeight - prevWeight).toFixed(2);

            const messages = [
                "¡Ojo! La subida suele ser agua o glucógeno. No es grasa. ¡Confía en el proceso!",
                "Las fluctuaciones son normales. El peso no baja lineal. ¡Sigue así!",
                "Calma. Si hay déficit, hay quema de grasa aunque el número suba hoy.",
                "Sube y baja, es parte del juego. Tu cuerpo se está ajustando.",
                "¡Gran trabajo! Cada gramo cuenta y vas por muy buen camino."
            ];

            motivText.innerText = (lastDiff > 0.05) ? messages[Math.floor(Math.random() * 4)] : messages[4];

            // Mostrar con pequeña demora para asegurar el renderizado
            splash.style.display = 'flex';
            setTimeout(() => { splash.style.opacity = '1'; }, 10);
            
            // Cierre automático en 10s
            setTimeout(closeSplash, 10000);
        }

        function closeSplash() {
            const splash = document.getElementById('summarySplash');
            splash.style.opacity = '0';
            setTimeout(() => { splash.style.display = 'none'; }, 600);
        }

        function stepWeight(val) {
            const input = document.getElementById('weightInput');
            let current = parseFloat(input.value || 75);
            input.value = (current + val).toFixed(2);
        }

        function updateChart() {
            const ctx = document.getElementById('weightChart');
            if (!ctx) return;
            const isDark = document.documentElement.classList.contains('dark');
            const sortedLogs = [...logs].sort((a, b) => new Date(a.date) - new Date(b.date));
            if (chartInstance) chartInstance.destroy();
            chartInstance = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: sortedLogs.map(l => l.date.split('-').reverse().slice(0,2).join('/')),
                    datasets: [{
                        data: sortedLogs.map(l => l.weight),
                        borderColor: '#10b981',
                        borderWidth: 4, tension: 0.3, pointRadius: 5, pointBackgroundColor: '#10b981', fill: false
                    }]
                },
                options: {
                    responsive: true, maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: {
                        y: { ticks: { color: isDark ? '#94a3b8' : '#64748b' }, grid: { color: isDark ? 'rgba(255,255,255,0.05)' : 'rgba(0,0,0,0.05)' } },
                        x: { ticks: { color: isDark ? '#94a3b8' : '#64748b' }, grid: { display: false } }
                    }
                }
            });
        }

        function renderHistory() {
            const list = document.getElementById('historyList');
            list.innerHTML = '';
            [...logs].sort((a,b) => new Date(b.date) - new Date(a.date)).forEach(entry => {
                const div = document.createElement('div');
                div.className = "flex items-center justify-between bg-white dark:bg-slate-800 p-4 rounded-2xl border dark:border-slate-700 shadow-sm";
                div.innerHTML = `
                    <span class="font-black text-slate-800 dark:text-white text-lg">${entry.weight} kg</span>
                    <span class="text-[10px] font-bold text-slate-400 uppercase">${entry.date}</span>
                    <button onclick="deleteEntry(${entry.id})" class="text-slate-300 px-2">✕</button>
                `;
                list.appendChild(div);
            });
        }

        document.getElementById('weightForm').onsubmit = (e) => {
            e.preventDefault();
            const weight = parseFloat(document.getElementById('weightInput').value);
            const date = document.getElementById('dateInput').value;
            if (logs.some(l => l.date === date)) { alert("Ya hay registro hoy"); return; }
            logs.push({ id: Date.now(), weight, date });
            localStorage.setItem('weightLogs', JSON.stringify(logs));
            updateChart();
            renderHistory();
        };

        window.deleteEntry = (id) => {
            if(confirm('¿Borrar?')) {
                logs = logs.filter(l => l.id !== id);
                localStorage.setItem('weightLogs', JSON.stringify(logs));
                updateChart();
                renderHistory();
            }
        };

        document.getElementById('themeToggle').onclick = () => {
            const isDark = document.documentElement.classList.toggle('dark');
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
            document.getElementById('themeToggle').innerText = isDark ? '☀️' : '🌙';
            updateChart();
        };

        window.onload = initApp;
    </script>
</body>
</html>
