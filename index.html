<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WeightTrack Pro</title>
    <link rel="icon" href="https://fav.farm/⚖️">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <script>tailwind.config = { darkMode: 'class' }</script>
    <style>
        body { transition: background-color 0.3s; font-family: sans-serif; -webkit-tap-highlight-color: transparent; }
        .glow-button:active { transform: scale(0.95); box-shadow: 0 0 15px #10b981; }
        /* Forzar que el canvas ocupe su espacio */
        #chartContainer { min-height: 220px; width: 100%; position: relative; }
    </style>
</head>
<body class="bg-slate-50 dark:bg-slate-900 min-h-screen pb-10 px-4">
    <div class="max-w-md mx-auto">
        <header class="py-8 flex justify-between items-center">
            <h1 class="text-3xl font-black text-slate-800 dark:text-white italic uppercase">Weight<span class="text-emerald-500">Track</span></h1>
            <button id="themeToggle" class="p-3 rounded-2xl bg-white dark:bg-slate-800 shadow-sm border border-slate-200 dark:border-slate-700">🌙</button>
        </header>

        <div class="bg-white dark:bg-slate-800 p-8 rounded-[2.5rem] shadow-xl mb-4 border dark:border-slate-700">
            <form id="weightForm" class="space-y-6 text-center">
                <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Peso hoy (kg)</label>
                <input type="number" id="weightInput" step="0.1" required class="w-full bg-transparent text-center text-6xl font-black text-slate-800 dark:text-white outline-none">
                <input type="date" id="dateInput" required class="w-full p-4 bg-slate-50 dark:bg-slate-900 border dark:border-slate-700 rounded-2xl text-sm font-bold text-slate-600 dark:text-slate-300 text-center">
                <button type="submit" class="w-full bg-emerald-500 text-white font-black py-5 rounded-2xl shadow-lg uppercase text-xs active:scale-95 transition-all">Registrar</button>
            </form>
        </div>

        <div class="flex justify-center gap-6 mb-8">
            <button onclick="stepWeight(-0.1)" class="glow-button w-20 h-14 bg-white dark:bg-slate-800 rounded-2xl border dark:border-slate-700 text-emerald-500 font-black">-0.1</button>
            <button onclick="stepWeight(0.1)" class="glow-button w-20 h-14 bg-white dark:bg-slate-800 rounded-2xl border dark:border-slate-700 text-emerald-500 font-black">+0.1</button>
        </div>

        <div class="bg-white dark:bg-slate-800 p-4 rounded-[2rem] shadow-sm mb-8 border dark:border-slate-700">
            <div id="chartContainer">
                <canvas id="weightChart"></canvas>
            </div>
        </div>

        <div id="historyList" class="space-y-3"></div>
    </div>

    <script>
        let logs = JSON.parse(localStorage.getItem('weightLogs')) || [];
        let chartInstance = null;

        // 1. Sincronizar UI
        function initApp() {
            const dateInput = document.getElementById('dateInput');
            const weightInput = document.getElementById('weightInput');
            
            // Fecha hoy
            dateInput.value = new Date().toISOString().split('T')[0];
            
            // Peso inicial
            if (logs.length > 0) {
                const sorted = [...logs].sort((a,b) => new Date(a.date) - new Date(b.date));
                weightInput.value = sorted[sorted.length - 1].weight.toFixed(1);
            } else {
                weightInput.value = "75.0";
            }
            
            updateChart();
            renderHistory();
        }

        function stepWeight(val) {
            const input = document.getElementById('weightInput');
            input.value = (parseFloat(input.value || 75) + val).toFixed(1);
        }

        // 2. Lógica del Gráfico (ULTRA COMPATIBLE)
        function updateChart() {
            const ctx = document.getElementById('weightChart');
            if (!ctx) return;

            // Ordenar datos
            const sortedLogs = [...logs].sort((a, b) => new Date(a.date) - new Date(b.date));
            const labels = sortedLogs.map(l => l.date.split('-').reverse().slice(0,2).join('/'));
            const data = sortedLogs.map(l => l.weight);

            // Destruir gráfico previo si existe para evitar errores en móvil
            if (chartInstance) {
                chartInstance.destroy();
            }

            // Crear nuevo gráfico
            chartInstance = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [{
                        data: data,
                        borderColor: '#10b981',
                        borderWidth: 4,
                        tension: 0.3,
                        pointRadius: 5,
                        pointBackgroundColor: '#10b981',
                        fill: false
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    animation: { duration: 500 },
                    plugins: { legend: { display: false } },
                    scales: {
                        y: { 
                            grid: { color: 'rgba(150,150,150,0.1)' },
                            ticks: { color: '#94a3b8', font: { size: 10 } }
                        },
                        x: { 
                            grid: { display: false },
                            ticks: { color: '#94a3b8', font: { size: 10 } }
                        }
                    }
                }
            });
        }

        function renderHistory() {
            const list = document.getElementById('historyList');
            list.innerHTML = '';
            [...logs].sort((a,b) => new Date(b.date) - new Date(a.date)).forEach(entry => {
                const div = document.createElement('div');
                div.className = "flex items-center justify-between bg-white dark:bg-slate-800 p-4 rounded-2xl border dark:border-slate-700 shadow-sm";
                div.innerHTML = `
                    <span class="font-black text-slate-800 dark:text-white text-lg">${entry.weight} kg</span>
                    <span class="text-[10px] font-bold text-slate-400 uppercase">${entry.date}</span>
                    <button onclick="deleteEntry(${entry.id})" class="text-slate-200 hover:text-red-500 px-2">✕</button>
                `;
                list.appendChild(div);
            });
        }

        // 3. Eventos
        document.getElementById('weightForm').onsubmit = (e) => {
            e.preventDefault();
            const weight = parseFloat(document.getElementById('weightInput').value);
            const date = document.getElementById('dateInput').value;

            if (logs.some(l => l.date === date)) {
                alert("Ya tienes un peso para hoy.");
                return;
            }
