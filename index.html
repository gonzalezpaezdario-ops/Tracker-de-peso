<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Oreja's Tracker</title>
    <link rel="icon" href="https://fav.farm/⚖️">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/hammerjs@2.0.8/hammer.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-zoom@2.0.1/dist/chartjs-plugin-zoom.min.js"></script>
    
    <script>
        tailwind.config = { darkMode: 'class' };
        const savedTheme = localStorage.getItem('theme');
        if (savedTheme === 'dark' || (!savedTheme && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        } else {
            document.documentElement.classList.remove('dark');
        }
    </script>
    <style>
        body { transition: background-color 0.3s; font-family: sans-serif; -webkit-tap-highlight-color: transparent; overflow-x: hidden; }
        .card { transition: all 0.3s ease; }
        .glow-button:active { transform: scale(0.95); box-shadow: 0 0 15px #10b981; }
        #chartContainer { min-height: 220px; width: 100%; position: relative; touch-action: none; }
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        input[type=number] { -moz-appearance: textfield; }
        .title-glow { text-shadow: 0 0 10px rgba(16, 185, 129, 0.4); }

        /* Overlay Neon */
        #neonOverlay {
            position: fixed; inset: 0; z-index: 99999; display: none; align-items: center; justify-content: center;
            backdrop-filter: blur(15px) saturate(180%); -webkit-backdrop-filter: blur(15px) saturate(180%);
            background: rgba(248, 250, 252, 0.8); opacity: 0; transition: opacity 0.5s cubic-bezier(0.4, 0, 0.2, 1); cursor: pointer;
        }
        .dark #neonOverlay { background: rgba(15, 23, 42, 0.9); }
        .neon-box {
            background: rgba(255, 255, 255, 0.9); border: 2px solid rgba(16, 185, 129, 0.2);
            box-shadow: 0 0 20px rgba(16, 185, 129, 0.1), inset 0 0 10px rgba(16, 185, 129, 0.05);
            animation: boxPulse 4s infinite ease-in-out; transform: scale(0.9); transition: transform 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        .dark .neon-box { background: rgba(30, 41, 59, 0.8); border: 2px solid rgba(16, 185, 129, 0.4); box-shadow: 0 0 30px rgba(16, 185, 129, 0.2); }
        @keyframes boxPulse { 0%, 100% { border-color: rgba(16, 185, 129, 0.2); } 50% { border-color: rgba(16, 185, 129, 0.5); } }
        .neon-text-lost { animation: textFlicker 3s infinite; color: #10b981; }
        @keyframes textFlicker { 0%, 100% { opacity: 1; } 50% { opacity: 0.8; } }
        #neonOverlay.active { display: flex; opacity: 1; }
        #neonOverlay.active .neon-box { transform: scale(1); }
        
        #averageModal { position: fixed; inset: 0; z-index: 50; display: none; align-items: center; justify-content: center; background: rgba(0,0,0,0.5); backdrop-filter: blur(5px); opacity: 0; transition: opacity 0.3s; }
        #averageModal.active { display: flex; opacity: 1; }
    </style>
</head>
<body class="bg-slate-50 dark:bg-slate-900 min-h-screen pb-10 px-4 overflow-x-hidden">
    
    <div id="neonOverlay" onclick="closeNeonOverlay()">
        <div class="neon-box max-w-sm w-full mx-6 p-10 rounded-[3rem] text-center space-y-6">
            <p class="text-[11px] font-black text-slate-400 dark:text-slate-500 uppercase tracking-[0.4em]">Análisis de Progreso</p>
            <p id="totalLostText" class="neon-text-lost text-5xl font-black tracking-tighter"></p>
            <p id="motivationText" class="text-sm text-slate-600 dark:text-slate-200 font-bold leading-relaxed italic px-2"></p>
            <div class="pt-4"><p class="text-[9px] text-slate-400 dark:text-slate-500 uppercase tracking-widest animate-pulse">Toca la pantalla para continuar</p></div>
        </div>
    </div>

    <div id="averageModal" onclick="closeAverageModal()">
        <div class="bg-white dark:bg-slate-800 p-8 rounded-3xl shadow-2xl max-w-xs w-full mx-4 text-center border dark:border-slate-700 transform transition-transform scale-95" onclick="event.stopPropagation()">
            <h3 class="text-xs font-black text-slate-400 uppercase tracking-widest mb-4">Media últimos 7 días</h3>
            <p id="averageValue" class="text-5xl font-black text-slate-800 dark:text-white mb-6">-- kg</p>
            <p id="averageContext" class="text-sm text-slate-500 dark:text-slate-400 mb-6 font-medium"></p>
            <button onclick="closeAverageModal()" class="w-full py-3 bg-slate-100 dark:bg-slate-700 text-slate-700 dark:text-white font-bold rounded-xl active:scale-95 transition-transform">Cerrar</button>
        </div>
    </div>

    <div class="max-w-md mx-auto">
        <header class="py-8 flex justify-between items-center">
            <h1 class="text-3xl font-black text-slate-800 dark:text-white uppercase tracking-tighter title-glow">Oreja's <span class="text-emerald-500">Tracker</span></h1>
            <button id="themeToggle" class="p-3 rounded-2xl bg-white dark:bg-slate-800 shadow-sm border dark:border-slate-700 text-xl"></button>
        </header>

        <div class="bg-white dark:bg-slate-800 p-8 rounded-[2.5rem] shadow-xl mb-4 border dark:border-slate-700 card">
            <form id="weightForm" class="space-y-6 text-center">
                <label class="text-[10px] font-black text-slate-400 dark:text-slate-500 uppercase tracking-widest">Peso hoy (kg)</label>
                <input type="number" id="weightInput" step="0.01" required class="w-full bg-transparent text-center text-6xl font-black text-slate-800 dark:text-white outline-none focus:ring-0">
                <input type="date" id="dateInput" required class="w-full p-4 bg-slate-50 dark:bg-slate-900 border dark:border-slate-700 rounded-2xl text-sm font-bold text-slate-600 dark:text-slate-300 text-center outline-none">
                <button type="submit" class="w-full bg-emerald-500 text-white font-black py-5 rounded-2xl shadow-lg uppercase text-xs active:scale-95 transition-all">Registrar</button>
            </form>
        </div>

        <div class="flex justify-center gap-6 mb-8">
            <button onclick="stepWeight(-0.1)" class="glow-button w-20 h-14 bg-white dark:bg-slate-800 rounded-2xl border dark:border-slate-700 text-emerald-500 font-black">-0.1</button>
            <button onclick="stepWeight(0.1)" class="glow-button w-20 h-14 bg-white dark:bg-slate-800 rounded-2xl border dark:border-slate-700 text-emerald-500 font-black">+0.1</button>
        </div>

        <div class="mb-8">
            <button onclick="calculate7DayAverage()" class="w-full bg-indigo-50 dark:bg-indigo-900/30 border border-indigo-100 dark:border-indigo-800/50 text-indigo-600 dark:text-indigo-400 font-bold py-4 rounded-2xl shadow-sm uppercase tracking-widest text-xs active:scale-95 transition-all flex items-center justify-center gap-2">
                Media últimos 7 días
            </button>
        </div>

        <div class="bg-white dark:bg-slate-800 p-4 rounded-[2rem] shadow-sm mb-4 border dark:border-slate-700 card">
            <div id="chartContainer">
                <canvas id="weightChart"></canvas>
            </div>
            <div class="text-[8px] text-center text-slate-400 mt-2 uppercase tracking-widest">Desliza para mover • Pellizca para zoom</div>
        </div>

        <div id="historyList" class="space-y-3"></div>
    </div>

    <script>
        let logs = JSON.parse(localStorage.getItem('weightLogs')) || [];
        let chartInstance = null;
        let autoCloseTimer = null; 

        function initApp() {
            const dateInput = document.getElementById('dateInput');
            const weightInput = document.getElementById('weightInput');
            const themeBtn = document.getElementById('themeToggle');
            themeBtn.innerText = document.documentElement.classList.contains('dark') ? '☀️' : '🌙';
            dateInput.value = new Date().toISOString().split('T')[0];
            if (logs.length > 0) {
                const sorted = [...logs].sort((a,b) => new Date(a.date) - new Date(b.date));
                weightInput.value = sorted[sorted.length - 1].weight;
                if (logs.length >= 2) showInmersiveSummary(sorted);
            } else { weightInput.value = "75.00"; }
            updateChart();
            renderHistory();
        }

        function showInmersiveSummary(sortedLogs) {
            const overlay = document.getElementById('neonOverlay');
            const totalText = document.getElementById('totalLostText');
            const motivText = document.getElementById('motivationText');
            const firstWeight = sortedLogs[0].weight;
            const currentWeight = sortedLogs[sortedLogs.length - 1].weight;
            const totalDiff = (currentWeight - firstWeight).toFixed(2);

            if (totalDiff < 0) { totalText.innerText = `${Math.abs(totalDiff)} kg MENOS`; totalText.className = "neon-text-lost text-5xl font-black tracking-tighter"; }
            else if (totalDiff > 0) { totalText.innerText = `${totalDiff} kg MÁS`; totalText.className = "text-5xl font-black tracking-tighter text-red-500 dark:text-red-400 title-glow"; }
            else { totalText.innerText = "PESO ESTABLE"; totalText.className = "text-4xl font-black tracking-tighter text-slate-500 title-glow"; }

            const lastDiff = (sortedLogs[sortedLogs.length-1].weight - sortedLogs[sortedLogs.length-2].weight).toFixed(2);
            const messages = ["¡Ojo! Subida por agua/glucógeno. ¡Confía!", "Fluctuaciones normales. ¡Sigue así!", "Calma. Si hay déficit, hay quema.", "Sube y baja, es parte del juego.", "¡Gran trabajo! Vas por buen camino."];
            motivText.innerText = (lastDiff > 0.05) ? messages[Math.floor(Math.random() * 4)] : messages[4];

            document.body.style.overflow = 'hidden';
            overlay.classList.add('active');
            autoCloseTimer = setTimeout(closeNeonOverlay, 10000);
        }

        function closeNeonOverlay() {
            const overlay = document.getElementById('neonOverlay');
            if (autoCloseTimer) clearTimeout(autoCloseTimer);
            overlay.classList.remove('active');
            document.body.style.overflow = '';
            setTimeout(() => { overlay.style.display = 'none'; }, 500); 
        }

        function calculate7DayAverage() {
            if (logs.length === 0) { alert("Aún no tienes registros."); return; }
            const modal = document.getElementById('averageModal');
            const sortedLogs = [...logs].sort((a,b) => new Date(b.date) - new Date(a.date));
            const mostRecentDate = new Date(sortedLogs[0].date);
            const sevenDaysAgo = new Date(mostRecentDate);
            sevenDaysAgo.setDate(mostRecentDate.getDate() - 6);
            const recentLogs = sortedLogs.filter(log => { const d = new Date(log.date); return d >= sevenDaysAgo && d <= mostRecentDate; });
            if (recentLogs.length === 0) { document.getElementById('averageValue').innerText = "-- kg"; }
            else {
                const average = recentLogs.reduce((acc, curr) => acc + curr.weight, 0) / recentLogs.length;
                document.getElementById('averageValue').innerText = `${average.toFixed(2)} kg`;
                document.getElementById('averageContext').innerText = `Basado en ${recentLogs.length} día(s).`;
            }
            modal.style.display = 'flex';
            setTimeout(() => { modal.classList.add('active'); modal.querySelector('div').className = modal.querySelector('div').className.replace('scale-95', 'scale-100'); }, 10);
        }

        function closeAverageModal() {
            const modal = document.getElementById('averageModal');
            modal.classList.remove('active');
            setTimeout(() => { modal.style.display = 'none'; }, 300);
        }

        function stepWeight(val) {
            const input = document.getElementById('weightInput');
            input.value = (parseFloat(input.value || 75) + val).toFixed(2);
        }

        function updateChart() {
            const ctx = document.getElementById('weightChart');
            if (!ctx) return;
            const isDark = document.documentElement.classList.contains('dark');
            const sortedLogs = [...logs].sort((a, b) => new Date(a.date) - new Date(b.date));
            
            if (chartInstance) chartInstance.destroy();

            chartInstance = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: sortedLogs.map(l => l.date.split('-').reverse().slice(0,2).join('/')),
                    datasets: [{
                        data: sortedLogs.map(l => l.weight),
                        borderColor: '#10b981',
                        borderWidth: 2, // Línea más fina
                        tension: 0.3,
                        pointRadius: 3, // Puntos más pequeños
                        pointBackgroundColor: '#10b981',
                        fill: false
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    layout: { padding: { left: 10, right: 10 } },
                    plugins: {
                        legend: { display: false },
                        zoom: { // CONFIGURACIÓN DE ZOOM Y PAN
                            pan: {
                                enabled: true,
                                mode: 'x', // Solo navegar horizontalmente en el tiempo
                                threshold: 10
                            },
                            zoom: {
                                wheel: { enabled: true },
                                pinch: { enabled: true }, // Zoom con dedos
                                mode: 'x'
                            }
                        }
                    },
                    scales: {
                        y: { ticks: { color: isDark ? '#94a3b8' : '#64748b', font: { size: 10 } }, grid: { color: isDark ? 'rgba(255,255,255,0.05)' : 'rgba(0,0,0,0.05)' } },
                        x: { ticks: { color: isDark ? '#94a3b8' : '#64748b', font: { size: 10 } }, grid: { display: false } }
                    }
                }
            });
        }

        function renderHistory() {
            const list = document.getElementById('historyList');
            list.innerHTML = '';
            [...logs].sort((a,b) => new Date(b.date) - new Date(a.date)).forEach(entry => {
                const div = document.createElement('div');
                div.className = "flex items-center justify-between bg-white dark:bg-slate-800 p-4 rounded-2xl border dark:border-slate-700 shadow-sm card hover:scale-[1.01]";
                div.innerHTML = `
                    <span class="font-black text-slate-800 dark:text-white text-lg">${entry.weight} kg</span>
                    <span class="text-[10px] font-bold text-slate-400 uppercase">${entry.date}</span>
                    <button onclick="deleteEntry(${entry.id})" class="text-slate-200 hover:text-red-400 p-1">✕</button>
                `;
                list.appendChild(div);
            });
        }

        document.getElementById('weightForm').onsubmit = (e) => {
            e.preventDefault();
            const weight = parseFloat(document.getElementById('weightInput').value);
            const date = document.getElementById('dateInput').value;
            if (logs.some(l => l.date === date)) { alert("Ya hay registro hoy"); return; }
            logs.push({ id: Date.now(), weight, date });
            localStorage.setItem('weightLogs', JSON.stringify(logs));
            updateChart();
            renderHistory();
        };

        window.deleteEntry = (id) => {
            if(confirm('¿Borrar?')) {
                logs = logs.filter(l => l.id !== id);
                localStorage.setItem('weightLogs', JSON.stringify(logs));
                updateChart();
                renderHistory();
            }
        };

        document.getElementById('themeToggle').onclick = () => {
            const isDark = document.documentElement.classList.toggle('dark');
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
            document.getElementById('themeToggle').innerText = isDark ? '☀️' : '🌙';
            updateChart();
        };

        window.onload = initApp;
    </script>
</body>
</html>
